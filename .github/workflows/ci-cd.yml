name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "func-db" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ── 1. Quality Assurance ──────────────────────────────────────────────────
  quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          pip install flake8 black bandit

      - name: Lint with flake8 (Syntax & logic)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check Formatting (Black)
        run: black . --check

      - name: Security Scan (Bandit)
        run: bandit -r . -ll

  # ── 2. Testing ───────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with Coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── 3. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Executables
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk binutils

      - name: Install Build Tools
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --name "HorizonBookingSystem" --add-data "database;database" main.py

      - name: Build Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --noconsole --name "HorizonBookingSystem" --add-data "database:database" main.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HorizonBookingSystem-${{ matrix.os }}
          path: dist/HorizonBookingSystem*

  # ── 4. Release ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HorizonBookingSystem-windows-latest/HorizonBookingSystem.exe
            HorizonBookingSystem-ubuntu-latest/HorizonBookingSystem
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
