name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "func-db" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "develop" ]
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Testing ───────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          xvfb-run pytest tests -ra -q --ignore=test_results.txt

  # ── 3. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Executables
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk binutils

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --noconsole --name "HorizonBookingSystem" --add-data "database;database" main.py

      - name: Build Binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --noconsole --name "HorizonBookingSystem" --add-data "database:database" main.py

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HorizonBookingSystem-${{ matrix.os }}
          path: dist/HorizonBookingSystem*

  # ── 4. Release ───────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HorizonBookingSystem-windows-latest/HorizonBookingSystem.exe
            HorizonBookingSystem-ubuntu-latest/HorizonBookingSystem
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
