version: 2.1

orbs:
  python: circleci/python@3.0.0
  win: circleci/windows@5.0.0

jobs:
  # ── 1. Quality Assurance ──────────────────────────────────────────────────
  quality:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - python/install-packages:
          pkg-manager: pip
      - run:
          name: Lint with flake8 (Syntax & logic)
          command: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - run:
          name: Check Formatting (Black)
          command: black . --check
      - run:
          name: Security Scan (Bandit)
          command: bandit -r . -ll

  # ── 2. Testing ───────────────────────────────────────────────────────────
  test:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install System Dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y python3-tk xvfb
      - python/install-packages:
          pkg-manager: pip
      - run:
          name: Run tests with Coverage
          command: |
            xvfb-run pytest tests -ra -q --ignore=test_results.txt --cov=. --cov-report=xml --cov-report=term-missing
      - run:
          name: Upload coverage reports to Codecov
          command: |
            if [ -n "$CODECOV_TOKEN" ]; then
              curl -Os https://uploader.codecov.io/latest/linux/codecov
              chmod +x codecov
              ./codecov -t ${CODECOV_TOKEN}
            else
              echo "CODECOV_TOKEN not found. Skipping upload."
            fi

  # ── 3. Build (Linux) ─────────────────────────────────────────────────────
  build-linux:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install System Dependencies
          command: |
            sudo apt-get update
            sudo apt-get install -y python3-tk binutils
      - python/install-packages:
          pkg-manager: pip
      - run:
          name: Build Binary (Linux)
          command: |
            pyinstaller --onefile --noconsole --name "HorizonBookingSystem" --add-data "database:database" main.py
      - store_artifacts:
          path: dist/HorizonBookingSystem
      - persist_to_workspace:
          root: .
          paths:
            - dist/HorizonBookingSystem

  # ── 3. Build (Windows) ───────────────────────────────────────────────────
  build-windows:
    executor:
      name: win/default
    steps:
      - checkout
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      - run:
          name: Build Binary (Windows)
          command: |
            pyinstaller --onefile --noconsole --name "HorizonBookingSystem" --add-data "database;database" main.py
      - store_artifacts:
          path: dist/HorizonBookingSystem.exe
      - persist_to_workspace:
          root: .
          paths:
            - dist/HorizonBookingSystem.exe

  # ── 4. Release ───────────────────────────────────────────────────────────
  release:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Create GitHub Release
          command: |
            if [ -z "$GH_TOKEN" ]; then
              echo "GH_TOKEN not found. Skipping release."
              exit 0
            fi
            TAG=$CIRCLE_TAG
            gh release create "$TAG" \
              dist/HorizonBookingSystem \
              dist/HorizonBookingSystem.exe \
              --title "Release $TAG" \
              --notes "Automated release from CircleCI"

workflows:
  version: 2
  ci_cd_pipeline:
    jobs:
      - quality:
          filters:
            tags:
              only: /^v.*/
      - test:
          requires:
            - quality
          filters:
            tags:
              only: /^v.*/
      - build-linux:
          requires:
            - test
          filters:
            tags:
              only: /^v.*/
      - build-windows:
          requires:
            - test
          filters:
            tags:
              only: /^v.*/
      - release:
          requires:
            - build-linux
            - build-windows
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v.*/
